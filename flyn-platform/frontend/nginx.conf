server {
    listen 80;

    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
        # This is the key part for a Single Page Application (SPA)
        # It tries to find the file, then a directory, and if not found,
        # it falls back to serving /index.html. This allows React Router to handle the routing.
        try_files $uri $uri/ /index.html;
    }

    # Optional: You can add this block if you have other static assets in public folder
    # that need to be served directly.
    location ~ ^/(vite.svg|assets/.*)$ {
        root /usr/share/nginx/html;
        try_files $uri =404;
    }
}
